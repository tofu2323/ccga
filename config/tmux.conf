# Tmux Configuration for Claude Agents
# CCGA Project - Claude multi-agent setup

# Basic settings
set -g default-terminal "screen-256color"
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Key bindings
# Change prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Reload config file
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Status bar configuration
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Status bar colors (based on agent activity)
set -g status-bg colour235
set -g status-fg colour136

# Active window style
setw -g window-status-current-style fg=colour166,bg=colour238,bold
setw -g window-status-current-format ' #I:#W#F '

# Inactive window style
setw -g window-status-style fg=colour244,bg=colour234
setw -g window-status-format ' #I:#W#F '

# Pane border colors
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour166

# Message colors
set -g message-style fg=colour166,bg=colour235

# Status bar left
set -g status-left-length 30
set -g status-left '#[fg=colour166]#S #[fg=colour245]| '

# Status bar right
set -g status-right-length 60
set -g status-right '#[fg=colour245]%Y-%m-%d #[fg=colour166]%H:%M #[fg=colour245]| #[fg=colour166]Agents: #{session_windows}'

# Pane titles
set -g pane-border-status top
set -g pane-border-format '#[fg=colour245]#{pane_index}: #{pane_title}'

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off
set -g activity-action other

# Agent-specific window naming
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Copy mode settings
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Logging (for agent monitoring)
bind P pipe-pane -o "cat >>~/logs/tmux-#W.log" \; display "Toggled logging to ~/logs/tmux-#W.log"

# Session management for agents
bind N new-session \; display "New agent session created"
bind X confirm-before -p "Kill agent session #S? (y/n)" kill-session

# Custom commands for agent management
bind A command-prompt -p "Agent ID:" "new-window -n 'agent-%1' 'scripts/agent-commands.sh %1'"
bind S display-popup -E -w 80 -h 24 "scripts/tmux-16-agents.sh status"

# Enable UTF-8 support
setw -g utf8 on
set -g status-utf8 on

# Escape time for Vim compatibility
set -sg escape-time 0

# Don't rename windows automatically
set-option -g allow-rename off 