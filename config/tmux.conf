# Claude Code 16-Agent tmux configuration

# 基本設定
set -g default-terminal "screen-256color"
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
setw -g aggressive-resize on

# プレフィックスキーの設定（Ctrl+a）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# マウスサポート
set -g mouse on

# ペイン分割のキーバインド
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# ペイン移動のキーバインド（Vimスタイル）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインサイズ調整
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ペイン番号表示
bind q display-panes -d 3000

# ステータスバーの設定
set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %Y/%m/%d #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

# アクティブペインのボーダー色
set -g pane-active-border-style 'fg=colour51'
set -g pane-border-style 'fg=colour238'

# ウィンドウステータス
setw -g window-status-current-style 'fg=colour81 bg=colour238 bold'
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-style 'fg=colour138 bg=colour235 none'
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# ペインタイトルの表示
set -g pane-border-status top
set -g pane-border-format "#{pane_index}: #{pane_title}"

# コピーモードの設定（Vimスタイル）
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# レイアウト保存・復元
bind S run-shell "tmux list-windows -F '#{window_layout}' > ~/.tmux-layout"
bind R run-shell "tmux select-layout \"$(cat ~/.tmux-layout)\""

# 16エージェント用のカスタムレイアウト
bind G select-layout "7a8e,319x79,0,0{79x19,0,0[79x4,0,0,0,79x4,0,5,1,79x4,0,10,2,79x4,0,15,3],79x19,80,0[79x4,80,0,4,79x4,80,5,5,79x4,80,10,6,79x4,80,15,7],79x19,160,0[79x4,160,0,8,79x4,160,5,9,79x4,160,10,10,79x4,160,15,11],79x19,240,0[79x4,240,0,12,79x4,240,5,13,79x4,240,10,14,79x4,240,15,15]}"

# ペインの同期トグル（全ペインに同じコマンドを送信）
bind y setw synchronize-panes

# 設定リロード
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ログ出力
bind P pipe-pane -o "cat >>~/.claude-agents/agent-#I-#P.log" \; display-message "Logging to ~/.claude-agents/agent-#I-#P.log"

# クイックコマンド
# 全エージェントにタスク送信
bind T command-prompt -p "Task for all agents:" "run-shell 'for i in {0..15}; do tmux send-keys -t 0.$i \"%1\" C-m; done'"

# 特定エージェントにタスク送信
bind A command-prompt -p "Agent number:,Task:" "send-keys -t 0.%1 '%2' C-m"

# エージェントステータス表示
bind I run-shell "tmux list-panes -F 'Agent #{pane_index}: #{pane_current_command}'"

# セッション名の設定
rename-session claude-agents

# ウィンドウ名の自動更新を無効化
setw -g automatic-rename off

# アクティビティ監視
setw -g monitor-activity on
set -g visual-activity on

# ベルの設定
set -g bell-action none
set -g visual-bell off

# エスケープタイムの短縮
set -sg escape-time 0

# インデックスを1から開始
set -g base-index 1
setw -g pane-base-index 0

# 環境変数の設定
set-environment -g CLAUDE_AGENTS_SESSION 1