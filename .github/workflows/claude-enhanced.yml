# デフォルトの claude.yml を拡張した統合版
name: Claude Enhanced
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      task:
        description: "Task for Claude"
        required: true
        type: string

jobs:
  # デフォルトの@claude応答 + マルチエージェント機能
  claude-enhanced:
    if: |
      contains(github.event.comment.body, '@claude') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # マルチエージェント判定
      - name: Check Multi-Agent Request
        id: check-multi
        run: |
          COMMENT="${{ github.event.comment.body || github.event.inputs.task }}"
          if [[ "$COMMENT" =~ "@claude-multi" ]] || [[ "$COMMENT" =~ "並列" ]] || [[ "$COMMENT" =~ "parallel" ]]; then
            echo "multi_agent=true" >> $GITHUB_OUTPUT
            echo "agent_count=4" >> $GITHUB_OUTPUT
          else
            echo "multi_agent=false" >> $GITHUB_OUTPUT
          fi

      # 単一エージェント実行（デフォルト）
      - name: Run Claude Code (Single Agent)
        if: steps.check-multi.outputs.multi_agent == 'false'
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: "claude-opus-4-20250514"
          allowed_tools: |
            Bash(npm install),Bash(npm run build),Bash(npm test),
            Bash(git status),Bash(git diff),Bash(gh pr create)

      # マルチエージェント実行
      - name: Setup Multi-Agent Environment
        if: steps.check-multi.outputs.multi_agent == 'true'
        run: |
          # tmux環境セットアップ（GitHub Actions用簡易版）
          sudo apt-get update && sudo apt-get install -y tmux

          # 4エージェント並列実行スクリプト
          cat > run-multi-agents.sh << 'EOF'
          #!/bin/bash
          TASK="${{ github.event.comment.body || github.event.inputs.task }}"
          CLEAN_TASK=$(echo "$TASK" | sed 's/@claude-multi//g')

          # エージェント役割定義
          declare -A AGENTS=(
            ["frontend"]="フロントエンド実装を担当"
            ["backend"]="バックエンド実装を担当"
            ["test"]="テスト作成を担当"
            ["review"]="コードレビューを担当"
          )

          # 各エージェントを並列実行
          for role in "${!AGENTS[@]}"; do
            (
              echo "Starting $role agent..."
              claude code "$CLEAN_TASK - ${AGENTS[$role]}" \
                --context-path . \
                --output-format json > "response-$role.json"
            ) &
          done

          # 全エージェントの完了を待つ
          wait

          # 結果を統合
          echo "## Multi-Agent Results" > multi-agent-summary.md
          for role in "${!AGENTS[@]}"; do
            echo "### $role Agent" >> multi-agent-summary.md
            jq -r '.message' "response-$role.json" >> multi-agent-summary.md
            echo "" >> multi-agent-summary.md
          done
          EOF

          chmod +x run-multi-agents.sh
          ./run-multi-agents.sh

      # 結果をコメントに投稿
      - name: Post Results
        if: steps.check-multi.outputs.multi_agent == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('multi-agent-summary.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

  # PR自動レビュー（デフォルトの claude-review.yml と同等）
  auto-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Auto Review with Claude
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: "claude-opus-4-20250514"
          direct_prompt: |
            このPRをレビューして、以下の観点でフィードバックしてください：
            - コード品質とベストプラクティス
            - 潜在的なバグ
            - パフォーマンスの考慮事項
            - セキュリティの懸念
            - テストカバレッジ

            建設的で具体的なフィードバックを心がけてください。
          use_sticky_comment: true
